<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Marker</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
        </svg>
      </div>
      <div class="title-group">
        <h1>Web Marker</h1>
        <span class="version" id="version"></span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat-row">
        <span class="stat-label" data-i18n="popup.pageAnnotations"></span>
        <span class="stat-value" id="count">—</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="toggle-row">
      <span class="toggle-label" data-i18n="popup.enableAnnotation"></span>
      <label class="switch">
        <input type="checkbox" id="toggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="data-row">
      <button class="data-btn" id="export-btn" data-i18n="popup.export"></button>
      <button class="data-btn" id="import-btn" data-i18n="popup.import"></button>
      <input type="file" id="import-file" accept=".json" style="display:none" />
    </div>

    <div class="divider"></div>

    <div id="pro-section">
      <div id="pro-free" class="pro-row">
        <span class="pro-label" data-i18n="popup.freeVersion"></span>
        <button class="pro-btn" id="pro-activate-btn" data-i18n="popup.activatePro"></button>
      </div>
      <div id="pro-active" class="pro-row" style="display:none">
        <span class="pro-label pro-badge">Pro</span>
        <span class="pro-email" id="pro-email"></span>
      </div>
      <div id="pro-input-row" class="pro-input-row" style="display:none">
        <input type="email" id="pro-email-input" class="pro-field" />
        <input type="text" id="pro-key-input" class="pro-field" />
        <button class="data-btn" id="pro-submit-btn" data-i18n="popup.verify"></button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="lang-row">
      <span class="lang-label" data-i18n="popup.language"></span>
      <select id="lang-select" class="lang-select">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>

    <div class="divider"></div>

    <div class="shortcuts">
      <div class="shortcuts-title" data-i18n="popup.shortcutsTitle"></div>
      <div class="shortcut-item">
        <kbd>Esc</kbd>
        <span data-i18n="popup.escHint"></span>
      </div>
      <div class="shortcut-item">
        <span class="shortcut-key" data-i18n="popup.rightClick"></span>
        <span data-i18n="popup.rightClickHint"></span>
      </div>
      <div class="shortcut-item">
        <span class="shortcut-key" data-i18n="popup.leftClick"></span>
        <span data-i18n="popup.leftClickHint"></span>
      </div>
      <div class="shortcut-item">
        <span class="shortcut-key" data-i18n="popup.dragFab"></span>
        <span data-i18n="popup.dragFabHint"></span>
      </div>
    </div>

    <p class="hint" data-i18n="popup.fileUrlHint"></p>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
